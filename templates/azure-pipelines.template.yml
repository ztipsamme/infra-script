variables:
  AZURE_SUBSCRIPTION: $AZURE_SUBSCRIPTION
  APP_NAME: $APP_NAME
  KEYVAULT_NAME: $KEYVAULT_NAME

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

stages:
  - stage: Build
    jobs:
      - job: Build
        displayName: 'Build Job'

        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '10.x'
              installationPath: $(Agent.ToolsDirectory)/dotnet

          - task: DotNetCoreCLI@2
            displayName: 'Build Solution'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '-c Release'

          - task: DotNetCoreCLI@2
            displayName: 'Publish Artifacts'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '**/*.csproj'
              arguments: '-c Release -o $(Build.ArtifactStagingDirectory)'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifacts'
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)
              ArtifactName: drop
              publishLocation: Container

  - stage: Apply_Migrations
    dependsOn: Build
    jobs:
      - job: MigrateDatabase
        steps:
          - checkout: self

          - task: AzureKeyVault@2
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              KeyVaultName: $(KEYVAULT_NAME)
              SecretsFilter: 'DefaultConnection'
              RunAsPreJob: false

          - task: UseDotNet@2
            inputs:
              packageType: sdk
              version: '10.x'

          - task: DotNetCoreCLI@2
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - script: dotnet tool install --global dotnet-ef
            displayName: 'Install EF Tool'

          - script: dotnet ef database update --project . --startup-project .
            displayName: 'Apply EF Migrations'
            env:
              ConnectionStrings__DefaultConnection: $(DefaultConnection)

  - stage: Deploy
    dependsOn: Apply_Migrations
    jobs:
      - deployment: DeployWebApp
        displayName: 'Deploy to azure app service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop

                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appType: webApp
                    appName: $(APP_NAME)
                    package: $(Pipeline.Workspace)/drop/**/*.zip
